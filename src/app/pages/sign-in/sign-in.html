<div class="min-h-screen bg-background flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <!-- Logo / Brand -->
    <div class="flex flex-col items-center mb-8">
      <div class="flex items-center justify-center w-10 h-10 rounded-md border border-border mb-4">
        <lucide-angular [img]="BookOpen" class="w-5 h-5 text-foreground" />
      </div>
      <h1 class="text-xl font-semibold tracking-tight text-foreground">Study Platform</h1>
      <p class="text-sm text-muted-foreground mt-1">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div hlmCard class="border border-border shadow-none rounded-xl">
      <div hlmCardContent class="pt-6 pb-6 px-6">
        <!-- Google Button -->
        <button hlmBtn variant="outline" class="w-full flex items-center gap-2 font-normal">
          <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4"
            />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853"
            />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              fill="#FBBC05"
            />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335"
            />
          </svg>
          Continue with Google
        </button>

        <!-- Separator -->
        <div class="relative my-5">
          <div class="absolute inset-0 flex items-center">
            <span hlmSeparator class="w-full"></span>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="bg-card px-2 text-muted-foreground">or</span>
          </div>
        </div>

        <!-- Form -->
        <form class="flex flex-col gap-4">
          <!-- Email -->
          <div class="flex flex-col gap-1.5">
            <label hlmLabel for="email">Email</label>
            <input hlmInput id="email" type="email" placeholder="you@example.com" class="w-full" />
          </div>

          <!-- Password -->
          <div class="flex flex-col gap-1.5">
            <div class="flex items-center justify-between">
              <label hlmLabel for="password">Password</label>
              <a
                href="#"
                class="text-xs text-muted-foreground hover:text-foreground transition-colors"
              >
                Forgot password?
              </a>
            </div>
            <div class="relative">
              <input
                hlmInput
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                placeholder="••••••••"
                class="w-full pr-10"
              />
              <button
                type="button"
                (click)="togglePassword()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors"
              >
                <lucide-angular [img]="showPassword ? EyeOff : Eye" class="w-4 h-4" />
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button hlmBtn class="w-full mt-1">Sign in</button>
        </form>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-sm text-muted-foreground mt-6">
      Don't have an account?
      <a
        href="#"
        class="text-foreground font-medium hover:underline underline-offset-4 transition-colors"
      >
        Sign up
      </a>
    </p>
  </div>
</div>

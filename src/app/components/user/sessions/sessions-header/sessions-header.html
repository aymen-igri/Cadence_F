<div
  class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between pb-6 border-b border-border"
>
  <div class="space-y-1">
    <h1 class="text-3xl font-bold tracking-tight text-foreground">Sessions</h1>
    <p class="text-sm text-muted-foreground">Manage your study timetable and progress.</p>
  </div>
  <div class="flex items-center gap-3">
    <div class="bg-muted p-1 rounded-md flex items-center gap-1">
      <button
        hlmBtn
        [variant]="viewMode() === 'list' ? 'default' : 'ghost'"
        size="sm"
        class="h-8 px-3 gap-2"
        (click)="viewModeChange.emit('list')"
      >
        <lucide-angular [img]="ListIcon" class="h-4 w-4" />
        List
      </button>
      <button
        hlmBtn
        [variant]="viewMode() === 'calendar' ? 'default' : 'ghost'"
        size="sm"
        class="h-8 px-3 gap-2"
        (click)="viewModeChange.emit('calendar')"
      >
        <lucide-angular [img]="CalendarIcon" class="h-4 w-4" />
        Calendar
      </button>
    </div>
    <button hlmBtn size="sm" class="gap-2 shadow-sm" (click)="createSessionDialogState.set('open')">
      <lucide-angular [img]="Plus" class="h-4 w-4" />
      Add session
    </button>
  </div>
</div>
<app-session-dialog
  [state]="createSessionDialogState()"
  (dialogStateChange)="createSessionDialogState.set($event)"
>
</app-session-dialog>

<div
  hlmCard
  class="flex flex-col h-full bg-card hover:border-border cursor-pointer transition-colors"
  (click)="cardClick.emit(group().id)"
>
  <div hlmCardHeader>
    <div class="flex items-center justify-between mb-2">
      <span hlmBadge [variant]="group().type === 'OPEN' ? 'default' : 'secondary'">
        {{ group().type | titlecase }}
      </span>
      <span hlmBadge variant="outline" *ngIf="role()">
        {{ role() | titlecase }}
      </span>
    </div>
    <h3 hlmCardTitle class="text-xl line-clamp-1">{{ group().name }}</h3>
    <p hlmCardDescription class="line-clamp-2 mt-2">{{ group().description }}</p>
  </div>

  <div class="grow"></div>

  <div hlmCardFooter class="flex items-center justify-between pt-4">
    <span class="text-sm text-muted-foreground">{{ memberCount() }} members</span>

    <button
      hlmBtn
      variant="secondary"
      size="sm"
      *ngIf="!role() && group().type === 'OPEN'"
      (click)="onJoinClick($event)"
    >
      Join
    </button>
    <button
      hlmBtn
      variant="outline"
      size="sm"
      *ngIf="!role() && group().type === 'LOCKED'"
      (click)="onRequestJoinClick($event)"
    >
      Request to join
    </button>
  </div>
</div>

<hlm-dialog [state]="state()" (stateChanged)="dialogStateChange.emit($event)">
  <hlm-dialog-content *hlmDialogPortal="let ctx" class="w-full sm:max-w-md">
    <hlm-dialog-header>
      <h3 hlmDialogTitle>Share a Session</h3>
      <p hlmDialogDescription>Select one of your completed sessions to share with the group.</p>
    </hlm-dialog-header>

    <div class="py-4">
      <!-- Mocking a select for a session -->
      <div class="space-y-2">
        <label hlmLabel>Completed Sessions</label>
        <select hlmInput [(ngModel)]="selectedSessionId" class="w-full h-10 px-3 cursor-pointer">
          <option value="">-- Choose a session --</option>
          <option value="sess1">Data Structures - 2 hours</option>
          <option value="sess2">Angular Signals - 1.5 hours</option>
        </select>
      </div>
    </div>

    <hlm-dialog-footer>
      <button hlmBtn variant="outline" (click)="closeDialog(ctx)">Cancel</button>
      <button hlmBtn (click)="confirm(ctx)" [disabled]="!selectedSessionId()">Share</button>
    </hlm-dialog-footer>
  </hlm-dialog-content>
</hlm-dialog>

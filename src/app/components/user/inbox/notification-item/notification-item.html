<div
  hlmCard
  [class.opacity-50]="item().isRead"
  class="group relative overflow-hidden rounded-xl border border-border/60 bg-card shadow-sm transition-all duration-300 hover:shadow-md hover:border-border"
>
  <!-- Unread accent line -->
  @if (!item().isRead) {
    <div class="absolute left-0 top-0 h-full w-0.75 bg-primary rounded-l-xl"></div>
  }

  <div hlmCardContent class="p-4 pl-5">
    <div class="flex items-start gap-3">

      <!-- Icon -->
      <div class="mt-0.5 flex h-9 w-9 shrink-0 items-center justify-center rounded-lg border border-border/70 bg-muted/40 transition-colors group-hover:bg-muted/70">
        <lucide-angular [img]="icon" class="h-4 w-4 text-muted-foreground" />
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0 flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="flex items-center gap-2">
            <p class="text-sm font-semibold text-foreground leading-snug truncate">
              {{ item().title }}
            </p>
            @if (!item().isRead) {
              <span class="inline-block h-1.5 w-1.5 shrink-0 rounded-full bg-primary"></span>
            }
          </div>
          <p class="text-sm text-muted-foreground mt-1 leading-relaxed line-clamp-2">
            {{ item().message }}
          </p>
        </div>

        <!-- Timestamp + Action -->
        <div class="flex flex-col items-end gap-2.5 shrink-0">
          <span class="text-[11px] font-medium text-muted-foreground/70 whitespace-nowrap tabular-nums">
            {{ item().createdAt | date: 'shortTime' }}
          </span>
          @if (!item().isRead) {
            <button
              hlmBtn
              variant="outline"
              size="sm"
              class="h-7 text-xs px-2.5 rounded-lg border-border/60 text-muted-foreground hover:text-foreground hover:border-border transition-colors"
              (click)="onMarkAsRead()"
            >
              Mark as read
            </button>
          }
        </div>
      </div>

    </div>
  </div>
</div>

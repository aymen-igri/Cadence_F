<div
  hlmCard
  [class.opacity-60]="item().isRead"
  class="border border-border rounded-lg shadow-none cursor-pointer transition-opacity"
  (click)="onMarkAsRead()"
>
  <div hlmCardContent class="p-4">
    <div class="flex items-start gap-3">
      <div class="mt-1 flex h-8 w-8 items-center justify-center rounded-md border border-border">
        <lucide-angular [img]="icon" class="h-4 w-4 text-muted-foreground" />
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-medium text-foreground">
              {{ item().title }}
              @if (!item().isRead) {
                <span class="ml-1 inline-block h-2 w-2 rounded-full bg-primary align-middle"></span>
              }
            </p>
            <p class="text-sm text-muted-foreground mt-0.5">
              {{ item().message }}
            </p>
          </div>
          <span class="text-xs text-muted-foreground whitespace-nowrap">{{
            item().createdAt | date: 'shortTime'
          }}</span>
        </div>
      </div>
    </div>
  </div>
</div>

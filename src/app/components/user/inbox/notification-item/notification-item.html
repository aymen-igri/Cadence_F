<div
  class="group px-4 py-3 transition-colors duration-150 hover:bg-muted/40"
  [class.opacity-50]="item().isRead"
>
  <div class="flex items-start gap-3">
    <!-- Left: title + status + time + description -->
    <div class="min-w-0 flex-1">
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-sm font-semibold text-foreground">{{ item().title }}</span>
        @if (!item().isRead) {
          <span class="inline-block h-1.5 w-1.5 shrink-0 rounded-full bg-primary"></span>
        }
        <span class="text-xs text-muted-foreground/70">
          {{ item().createdAt | date: 'shortTime' }}
        </span>
      </div>
      <p class="mt-1 truncate text-xs text-muted-foreground/80">
        {{ item().message }}
      </p>
    </div>

    <!-- Right: action button -->
    <div class="flex shrink-0 items-center gap-2">
      @if (!item().isRead) {
        <button
          hlmBtn
          variant="ghost"
          size="sm"
          class="h-7 text-xs text-muted-foreground hover:text-foreground"
          (click)="onMarkAsRead()"
        >
          Mark as read
        </button>
      }
    </div>
  </div>
</div>

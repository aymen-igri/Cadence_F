<hlm-card class="flex flex-col gap-4 p-5 h-full transition-all hover:border-foreground/25">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h3 class="font-semibold leading-tight text-foreground">{{ goal.title }}</h3>
      <p class="mt-1 text-xs font-medium text-primary">{{ goal.subject }}</p>
    </div>
    <span class="rounded-full bg-secondary/10 px-2.5 py-0.5 text-xs font-medium text-secondary">
      {{ daysLeft }} days left
    </span>
  </div>

  <p class="line-clamp-2 text-sm text-muted-foreground">{{ goal.description }}</p>

  <div class="mt-auto space-y-2 pt-2">
    <div class="flex items-center justify-between text-xs">
      <span class="text-muted-foreground">Progress</span>
      <span class="font-medium">{{ goal.progress }}%</span>
    </div>
    <div class="h-2 w-full overflow-hidden rounded-full bg-secondary/20">
      <div
        class="h-full rounded-full bg-primary transition-all duration-500 ease-in-out"
        [style.width.%]="goal.progress"
      ></div>
    </div>
  </div>

  <div class="flex items-center justify-between border-t border-border pt-4 text-xs">
    <span class="text-muted-foreground">Target date</span>
    <span class="font-medium text-foreground">{{ goal.deadline | date: 'MMM d, y' }}</span>
  </div>
</hlm-card>

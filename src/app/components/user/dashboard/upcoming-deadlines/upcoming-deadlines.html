<div hlmCard class="border border-border rounded-xl shadow-none h-full">
  <div hlmCardContent class="p-4">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-semibold text-foreground">Upcoming Deadlines</h3>
      <a href="#" class="text-xs text-muted-foreground hover:text-foreground transition-colors"
        >View all</a
      >
    </div>

    <div class="flex flex-col divide-y divide-border">
      @for (deadline of deadlines; track deadline.task) {
        <div class="py-3 first:pt-0 last:pb-0">
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-foreground truncate">{{ deadline.task }}</p>
              <p class="text-xs text-muted-foreground mt-0.5">{{ deadline.goal }}</p>
            </div>
            <div class="flex items-center gap-1 shrink-0">
              <ng-icon
                [name]="deadline.icon"
                class="w-3 h-3"
                [class]="deadline.urgent ? 'text-destructive' : 'text-muted-foreground'"
              />
              <span
                class="text-xs"
                [class]="deadline.urgent ? 'text-destructive font-medium' : 'text-muted-foreground'"
                >{{ deadline.dueIn }}</span
              >
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>

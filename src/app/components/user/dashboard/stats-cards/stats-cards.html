<div class="grid grid-cols-2 gap-4 lg:grid-cols-4">
  @for (stat of stats; track stat.label) {
    <div hlmCard class="border border-border rounded-xl shadow-none">
      <div hlmCardContent class="p-4">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-medium text-muted-foreground uppercase tracking-wide">{{
            stat.label
          }}</span>
          <ng-icon [name]="stat.icon" class="w-4 h-4 text-muted-foreground" />
        </div>
        <p class="text-2xl font-semibold tracking-tight text-foreground">{{ stat.value }}</p>
        <p class="text-xs text-muted-foreground mt-1">{{ stat.delta }}</p>
      </div>
    </div>
  }
</div>

<div hlmCard class="border border-border rounded-xl shadow-none">
  <div hlmCardContent class="p-4">
    <div class="flex items-start justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="flex h-9 w-9 items-center justify-center rounded-md border border-border">
          <lucide-angular [img]="BookOpen" class="h-4 w-4 text-muted-foreground" />
        </div>
        <div>
          <p class="text-sm font-medium text-foreground">{{ subject.name }}</p>
          <p class="text-xs text-muted-foreground mt-0.5">
            {{ subject.sessionsPerWeek }} sessions / week
          </p>
        </div>
      </div>
      <span class="text-xs rounded-full border border-border px-2 py-0.5 text-muted-foreground">{{
        subject.priority
      }}</span>
    </div>
    <div class="mt-4 h-1.5 w-full rounded-full bg-muted overflow-hidden">
      <div class="h-full rounded-full" [class]="subject.color"></div>
    </div>
  </div>
</div>

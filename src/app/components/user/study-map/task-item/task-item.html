<div class="flex items-start gap-3 p-3 rounded-md hover:bg-muted/50 transition-colors group">
  <div class="pt-1">
    <hlm-checkbox [checked]="completed()" (changed)="toggleCompletion()"></hlm-checkbox>
  </div>

  <div class="flex-1 min-w-0">
    <div class="flex items-start justify-between gap-4">
      <div>
        <p
          class="text-sm font-medium text-foreground"
          [class.line-through]="completed()"
          [class.text-muted-foreground]="completed()"
        >
          {{ task().title }}
        </p>
        @if (task().description) {
          <p class="text-xs text-muted-foreground mt-1 line-clamp-1">{{ task().description }}</p>
        }
      </div>

      <div class="flex items-center gap-3 shrink-0">
        <button
          [hlmDropdownMenuTrigger]="taskMenu"
          hlmBtn
          variant="ghost"
          size="icon"
          class="h-8 w-8 opacity-0 group-hover:opacity-100 transition-opacity"
        >
          <ng-icon name="moreVertical" class="h-4 w-4" />
        </button>
      </div>
    </div>
  </div>

  <ng-template #taskMenu>
    <hlm-dropdown-menu>
      <button hlmDropdownMenuItem (click)="updateTaskDialogState.set('open')">Edit task</button>
      <button hlmDropdownMenuItem class="text-destructive" (click)="onDeleteTask(task().id)">
        Delete task
      </button>
    </hlm-dropdown-menu>
  </ng-template>

  <app-task-form-dialog
    [state]="updateTaskDialogState()"
    (dialogStateChange)="updateTaskDialogState.set($event)"
    [task]="task()"
  >
  </app-task-form-dialog>
</div>
